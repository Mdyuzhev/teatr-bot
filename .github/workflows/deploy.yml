name: CD — Деплой бота

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    needs: []
    defaults:
      run:
        working-directory: /home/flomaster/teatr-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code
        run: |
          rsync -a --delete \
            --exclude='.env' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='.pytest_cache/' \
            "$GITHUB_WORKSPACE/" /home/flomaster/teatr-bot/

      - name: Install dependencies
        run: |
          . venv/bin/activate
          pip install -r requirements.txt -q

      - name: Run tests
        run: |
          . venv/bin/activate
          python -m pytest tests/unit/ -v --tb=short

      - name: Restart bot
        run: |
          pkill -f "python -m src.main" || true
          sleep 2
          nohup bash -c '. venv/bin/activate && python -m src.main' > /tmp/teatr-bot.log 2>&1 &
          sleep 3
          pgrep -f "python -m src.main" && echo "Bot started" || echo "Bot failed to start"
