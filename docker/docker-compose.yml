services:

  # ── Telegram-бот ──────────────────────────────────────────────────
  teatr-bot:
    build:
      context: ../
      dockerfile: Dockerfile
    image: teatr-bot:latest
    container_name: teatr-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: Europe/Moscow
      HTTPS_PROXY: http://vpn-proxy:8888
      HTTP_PROXY: http://vpn-proxy:8888
      NO_PROXY: teatr-postgres,localhost,127.0.0.1
    volumes:
      - ../logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      teatr-postgres:
        condition: service_healthy
    networks:
      - teatr-network
      - vpn-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── PostgreSQL ────────────────────────────────────────────────────
  teatr-postgres:
    image: postgres:16-alpine
    container_name: teatr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teatr_bot
      POSTGRES_USER: teatr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      TZ: Europe/Moscow
    ports:
      - "5435:5432"
    volumes:
      - teatr_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teatr_user -d teatr_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - teatr-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  teatr-network:
    name: teatr-network
  vpn-network:
    external: true
    name: vpn-proxy_default

volumes:
  teatr_pg_data:
    external: true
    name: postgres_teatr_pg_data
